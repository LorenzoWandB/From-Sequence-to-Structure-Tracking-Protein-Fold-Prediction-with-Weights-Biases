program: train_esm.py
method: bayes
name: esmfold-finetune-sweep
metric:
  name: val/rmsd
  goal: minimize

parameters:
  lr:
    distribution: log_uniform_values
    min: 1.0e-6
    max: 1.0e-3
  weight-decay:
    values: [0.0, 0.01, 0.1]
  num-recycles:
    values: [1, 2, 3, 4]
  unfreeze-layers:
    values: [0, 2, 4, 6]

command:
  - ${env}
  - python3
  - ${program}
  - --mode=finetune
  - --max-seq-len=128
  - --epochs=6
  - --data-dir=data_large
  - --unfreeze-backbone
  - ${args}
